# Make sure we have 256 colors.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Allow programs inside tmux to send escape sequences directly to the
# outer terminal — needed for Claude Code notifications, OSC 52
# clipboard, image protocols, and so on.
set -g allow-passthrough on

# Enable extended keys (CSI u / fixterms) so chords like C-; that
# legacy ASCII can't encode get through. Alacritty also sends a
# CSI u sequence for C-; explicitly via its keyboard.bindings.
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Remap prefix from 'C-b' to 'C-x'.
unbind C-b
set-option -g prefix C-x
bind-key C-x send-prefix

# C-\; toggles tmux "off" so emacs receives C-x normally.
bind -T root C-\; \
  set -g @captured 1 \; \
  set prefix None \; \
  set key-table off \; \
  refresh-client

# C-\; toggles tmux back on.
bind -T off C-\; \
  set -g @captured 0 \; \
  set -u prefix \; \
  set -u key-table \; \
  refresh-client

# Split panes using 2 and 3.
bind 2 split-window -v -c "#{pane_current_path}"
bind 3 split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %

# Kill the current pane.
bind k confirm -p " kill-pane? (y/n)" kill-pane

# Kill the entire window.
bind C-c confirm -p " kill-window? (y/n)" kill-window

# Cycle windows (repeatable).
bind -r n next-window
bind -r p previous-window

# Reorder windows (repeatable).
bind -r N swap-window -t +1 -d
bind -r P swap-window -t -1 -d

# Create a new named window in one step.
bind j command-prompt -p "new window:" "new-window -n '%%' -c '#{pane_current_path}'"

# Create a new named session in one step.
unbind s
bind s command-prompt -p "new session:" "new-session -s '%%' -c '#{pane_current_path}'"

# Tree picker (sessions + windows, no panes).
bind b choose-tree -wZ -O index -F "#{?window_format,#{window_name},}"

# Toggle zoom (maximize / restore current pane).
bind u resize-pane -Z
unbind z

# Cancel / escape.
bind g send-keys Escape

# Enter copy mode.
bind e copy-mode

# Paste tmux buffer.
bind y paste-buffer

# Use emacs keybindings.
setw -g mode-keys emacs
setw -g status-keys emacs

# Mouse support (scroll, click to focus, drag to resize).
set -g mouse on

# Reduce escape delay (default 500ms).
set -sg escape-time 0

# Pass focus events to programs inside tmux.
set -g focus-events on

# Message and mode style.
set -g message-style "bg=#9e8e60,fg=#282c34"
set -g mode-style "bg=#8a7a50,fg=#282c34"

# Capture mode flag (1 = C-\; capture / tmux off, 0 = normal).
set -g @captured 0

# Status bar style (recolors when in capture mode).
set -g status-style "#{?@captured,bg=#a87850 fg=#282c34,bg=#7c6f9f fg=#252038}"

# Status bar format.
set -g status-left " #S: "
set -g status-left-length 16
set -g window-status-current-format "#[bold,italics]#W#[default]"
set -g window-status-format "#W"

# Pane borders (recolor when in capture mode).
set -g pane-border-style "#{?@captured,fg=#a87850,fg=#7c6f9f}"
set -g pane-active-border-style "#{?@captured,fg=#a87850,fg=#7c6f9f}"

# Dim inactive panes.
set -g window-style "bg=#31353d"
set -g window-active-style "bg=#282c34"

# Status bar right side.
set -g status-right "%b %d %I:%M:%S %p "
set -g status-interval 1

# Don't rename windows automatically.
set-option -g allow-rename off

# Scrollback history.
set -g history-limit 100000

# Plugins.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '1'

# Initialize TPM (keep this line at the very bottom).
run '~/.tmux/plugins/tpm/tpm'
